<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公視新聞 404 避開洞洞</title>
  <style>
    :root {
      --blue: #007CFF;
      --hole: #0046A8;
      --red: #FF1616;
      --black: #171717;
      --page-bg: #F5F5F5;
      font-family: Roboto, "Noto Sans TC", "Noto Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--black);
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .viewport {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: var(--page-bg);
    }

    .artboard {
      position: relative;
      width: 1470px;
      min-height: 1260px;
      transform-origin: 0 0;
      background: var(--page-bg);
    }

    .header-shot {
      position: absolute;
      left: 123px;
      top: 0;
      width: 1224px;
      height: 168px;
      display: block;
      object-fit: contain;
      object-position: left top;
    }

    .message {
      position: absolute;
      left: 0;
      top: 258px;
      width: 1470px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      z-index: 3;
    }

    .message h1 {
      position: relative;
      margin: 0;
      width: 360px;
      height: 29px;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
      text-align: center;
      overflow: hidden;
    }

    .title-line {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateY(10px);
      animation: titleSwap 5.2s infinite;
    }

    .title-line:nth-child(2) {
      animation-delay: 2.6s;
    }

    @keyframes titleSwap {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      10%,
      42% {
        opacity: 1;
        transform: translateY(0);
      }
      50%,
      100% {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    .assist {
      display: grid;
      grid-template-columns: 128px 212px 128px;
      align-items: center;
      column-gap: 20px;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 500;
    }

    .assist > span:first-child {
      text-align: right;
    }

    .assist > span:last-child {
      text-align: left;
    }

    .search {
      position: relative;
      width: 212px;
      height: 44px;
    }

    .search input {
      width: 100%;
      height: 100%;
      border: 1px solid #d4d4d4;
      border-radius: 999px;
      background: transparent;
      padding: 0 48px 0 20px;
      color: #171717;
      font-size: 14px;
      outline: none;
    }

    .search input::placeholder {
      color: #a1a1a1;
      font-weight: 700;
    }

    .search svg {
      position: absolute;
      right: 18px;
      top: 12px;
      width: 20px;
      height: 20px;
      stroke: #5c5c5c;
    }

    .home-link {
      color: var(--blue);
      font-weight: 700;
    }

    .game {
      position: absolute;
      left: 0;
      top: 536px;
      width: 1470px;
      height: 320px;
      overflow: visible;
      background: var(--blue);
      user-select: none;
    }

    .ball {
      position: absolute;
      left: 0;
      top: 0;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--red);
      transform: translate(var(--ball-x, 226px), var(--ball-y, -49px));
      will-change: transform;
      z-index: 2;
    }

    .hole {
      position: absolute;
      top: 22px;
      width: 128px;
      height: 28px;
      border-radius: 50%;
      background: var(--hole);
      transform: translateX(var(--hole-x, 1470px));
      will-change: transform;
      z-index: 1;
    }

    .front-cover {
      position: absolute;
      left: 0;
      top: 22px;
      width: 128px;
      height: 298px;
      pointer-events: none;
      transform: translateX(var(--hole-x, 1470px));
      will-change: transform;
      z-index: 3;
    }

    .front-cover svg {
      display: block;
      width: 128px;
      height: 298px;
      shape-rendering: geometricPrecision;
    }

    .footer-shot {
      position: absolute;
      left: 0;
      top: 856px;
      width: 1470px;
      height: 520px;
      display: block;
      object-fit: cover;
      object-position: left top;
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <main class="artboard" id="page">
      <img class="header-shot" src="https://www.figma.com/api/mcp/asset/dc74ccf1-f051-4568-9a5e-69e05a6265fc" alt="">

      <section class="message" aria-labelledby="title">
        <h1 id="title">
          <span class="title-line">很抱歉，網頁不存在</span>
          <span class="title-line">404 not found</span>
        </h1>
        <div class="assist">
          <span>輸入關鍵字</span>
          <form class="search" action="https://news.pts.org.tw/search" method="get">
            <input type="search" name="q" placeholder="搜尋" aria-label="搜尋">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5" stroke-width="2"></circle>
              <path d="m16 16 4 4" stroke-width="2" stroke-linecap="round"></path>
            </svg>
          </form>
          <span>或回到 <a class="home-link" href="https://news.pts.org.tw/">首頁</a></span>
        </div>
      </section>

      <section class="game" id="game" aria-label="紅點掉進洞口動畫">
        <span class="ball" id="ball"></span>
        <span class="hole" id="hole"></span>
        <span class="front-cover" id="frontCover" aria-hidden="true">
          <svg viewBox="0 0 128 298" preserveAspectRatio="none">
            <path d="M0 14 C0 21.7 28.7 28 64 28 C99.3 28 128 21.7 128 14 L128 298 L0 298 Z" fill="#007CFF"></path>
          </svg>
        </span>
      </section>

      <img class="footer-shot" src="https://www.figma.com/api/mcp/asset/720911ed-1e2d-4471-8d44-7b6af569d229" alt="">
    </main>
  </div>

  <script>
    const DESIGN_WIDTH = 1470;
    const page = document.getElementById("page");
    const viewport = document.getElementById("viewport");
    const ball = document.getElementById("ball");
    const hole = document.getElementById("hole");
    const frontCover = document.getElementById("frontCover");

    const state = {
      ballX: -90,
      ballY: -49,
      holeX: 300,
      lastTime: 0,
      falling: false,
      done: false,
      sinkProgress: 0,
    };

    const groundY = -49;
    const sinkDuration = 0.82;
    const speed = 420;
    const ballSize = 70;
    const holeWidth = 128;
    const fallBallX = state.holeX + holeWidth / 2 - ballSize / 2;

    function fitArtboard() {
      const scale = window.innerWidth / DESIGN_WIDTH;
      page.style.transform = `scale(${scale})`;
      viewport.style.height = `${page.offsetHeight * scale}px`;
    }

    function update(time) {
      if (!state.lastTime) state.lastTime = time;
      const dt = Math.min((time - state.lastTime) / 1000, 0.032);
      state.lastTime = time;

      if (!state.falling && !state.done) {
        state.ballX = Math.min(state.ballX + speed * dt, fallBallX);
        if (state.ballX >= fallBallX) {
          state.falling = true;
          state.sinkProgress = 0;
        }
      }

      if (state.falling) {
        state.sinkProgress += dt / sinkDuration;
        state.ballY = groundY + state.sinkProgress * 112;
        if (state.sinkProgress >= 1) {
          state.sinkProgress = 1;
          state.falling = false;
          state.done = true;
        }
      }

      ball.style.setProperty("--ball-x", `${state.ballX}px`);
      ball.style.setProperty("--ball-y", `${state.ballY}px`);
      hole.style.setProperty("--hole-x", `${state.holeX}px`);
      frontCover.style.setProperty("--hole-x", `${state.holeX}px`);
      requestAnimationFrame(update);
    }

    window.addEventListener("resize", fitArtboard);

    fitArtboard();
    requestAnimationFrame(update);
  </script>
</body>
</html>
