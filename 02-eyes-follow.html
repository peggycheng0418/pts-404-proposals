<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公視新聞 404 眼睛互動</title>
  <style>
    :root {
      --blue: #007CFF;
      --red: #FF1616;
      --black: #111111;
      --page-bg: #F5F5F5;
      --footer-start: 740px;
      font-family: Roboto, "Noto Sans TC", "Noto Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--black);
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .viewport {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: var(--page-bg);
    }

    .artboard {
      position: relative;
      width: 1470px;
      min-height: 1260px;
      transform-origin: 0 0;
      background: var(--page-bg);
    }

    .header-shot {
      position: absolute;
      left: 123px;
      top: 0;
      width: 1224px;
      height: 168px;
      display: block;
      object-fit: contain;
      object-position: left top;
    }

    .message {
      position: absolute;
      left: 0;
      top: 258px;
      width: 1470px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      z-index: 3;
    }

    .message h1 {
      position: relative;
      margin: 0;
      width: 360px;
      height: 29px;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
      text-align: center;
      overflow: hidden;
    }

    .title-line {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateY(10px);
      animation: titleSwap 5.2s infinite;
    }

    .title-line:nth-child(2) {
      animation-delay: 2.6s;
    }

    @keyframes titleSwap {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      10%,
      42% {
        opacity: 1;
        transform: translateY(0);
      }
      50%,
      100% {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    .assist {
      display: grid;
      grid-template-columns: 128px 212px 128px;
      align-items: center;
      column-gap: 20px;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 500;
    }

    .assist > span:first-child {
      text-align: right;
    }

    .assist > span:last-child {
      text-align: left;
    }

    .hero {
      position: absolute;
      left: 0;
      top: 228px;
      width: 1470px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .error-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 92px;
    }

    .four {
      position: relative;
      width: 75px;
      height: 83px;
      flex: 0 0 auto;
    }

    .four img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .zero-face {
      position: relative;
      width: 83px;
      height: 83px;
      border-radius: 50%;
      background: var(--red);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .eyes {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }

    .eye {
      position: absolute;
      top: 23px;
      width: 20px;
      height: 20px;
      transform: translate(var(--eye-x, 0px), var(--eye-y, 0px));
      transition: transform 40ms linear;
    }

    .eye.left {
      left: 18px;
    }

    .eye.right {
      left: 46px;
    }

    .eye::before,
    .eye::after {
      content: "";
      position: absolute;
      left: 7.5px;
      top: 0;
      width: 5px;
      height: 20px;
      border-radius: 0;
      background: #000;
      transform-origin: center;
    }

    .eye::before {
      transform: rotate(45deg);
    }

    .eye::after {
      transform: rotate(-45deg);
    }

    .prompt {
      margin: 32px 0 12px;
      font-size: 16px;
      line-height: 1.6;
      font-weight: 400;
    }

    .search {
      position: relative;
      width: 252px;
      height: 45px;
    }

    .search input {
      width: 100%;
      height: 100%;
      border: 1px solid #d6d6d6;
      border-radius: 999px;
      background: #fff;
      padding: 0 46px 0 24px;
      color: #171717;
      font-size: 14px;
      outline: none;
    }

    .search input::placeholder {
      color: #9a9a9a;
      font-weight: 400;
    }

    .search svg {
      position: absolute;
      right: 18px;
      top: 13px;
      width: 20px;
      height: 20px;
      stroke: #444;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 252px;
      margin-top: 36px;
    }

    .action {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 252px;
      height: 41px;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      font-size: 16px;
      line-height: 1;
      font-weight: 700;
    }

    .footer-shot {
      position: absolute;
      left: 0;
      top: var(--footer-start);
      width: 1470px;
      height: 520px;
      display: block;
      object-fit: cover;
      object-position: left top;
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <main class="artboard" id="page">
      <img class="header-shot" src="https://www.figma.com/api/mcp/asset/dc74ccf1-f051-4568-9a5e-69e05a6265fc" alt="">

      <section class="hero" aria-labelledby="errorTitle">
        <h1 class="error-mark" id="errorTitle" aria-label="404">
          <span class="four" aria-hidden="true">
            <img src="https://www.figma.com/api/mcp/asset/4d55c674-3446-471d-a18b-e6480f5029fc" alt="">
          </span>
          <span class="zero-face" id="face" aria-hidden="true">
            <span class="eyes" id="eyes">
              <span class="eye left"></span>
              <span class="eye right"></span>
            </span>
          </span>
          <span class="four" aria-hidden="true">
            <img src="https://www.figma.com/api/mcp/asset/51593ed1-0a89-4cea-a3c9-812ad081a428" alt="">
          </span>
        </h1>
        <p class="prompt">請輸入關鍵字</p>
        <form class="search" action="https://news.pts.org.tw/search" method="get">
          <input type="search" name="q" placeholder="搜尋" aria-label="搜尋">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5" stroke-width="2"></circle>
            <path d="m16 16 4 4" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </form>
        <div class="actions">
          <a class="action" href="https://news.pts.org.tw/">← 回首頁</a>
          <a class="action" href="https://news.pts.org.tw/hotTopic">看大家都在討論什麼 →</a>
        </div>
      </section>

      <img class="footer-shot" src="https://www.figma.com/api/mcp/asset/720911ed-1e2d-4471-8d44-7b6af569d229" alt="">
    </main>
  </div>

  <script>
    const DESIGN_WIDTH = 1470;
    const page = document.getElementById("page");
    const viewport = document.getElementById("viewport");
    const face = document.getElementById("face");

    function fitArtboard() {
      const scale = window.innerWidth / DESIGN_WIDTH;
      page.style.transform = `scale(${scale})`;
      viewport.style.height = `${page.offsetHeight * scale}px`;
    }

    function setEyes(clientX, clientY) {
      const rect = face.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = clientX - centerX;
      const dy = clientY - centerY;
      const distance = Math.hypot(dx, dy) || 1;
      const maxMove = 10;
      const x = (dx / distance) * maxMove;
      const y = (dy / distance) * maxMove;
      face.style.setProperty("--eye-x", `${x}px`);
      face.style.setProperty("--eye-y", `${y}px`);
    }

    window.addEventListener("resize", fitArtboard);
    window.addEventListener("pointermove", (event) => setEyes(event.clientX, event.clientY));
    window.addEventListener("pointerleave", () => {
      face.style.setProperty("--eye-x", "0px");
      face.style.setProperty("--eye-y", "0px");
    });
    fitArtboard();
  </script>
</body>
</html>
