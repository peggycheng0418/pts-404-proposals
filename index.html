<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公視新聞 404 提案</title>
  <style>
    :root {
      --blue: #007CFF;
      --black: #171717;
      --gray: #737373;
      --bg: #F5F5F5;
      font-family: Roboto, "Noto Sans TC", "Noto Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--black);
    }

    body {
      display: grid;
      place-items: center;
      padding: 48px 20px;
    }

    main {
      width: min(920px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.25;
      font-weight: 700;
      color: var(--blue);
    }

    p {
      margin: 0 0 32px;
      color: var(--gray);
      font-size: 16px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    a {
      display: flex;
      min-height: 128px;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid #D4D4D4;
      background: transparent;
      padding: 20px;
      color: inherit;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      border-color: var(--blue);
      outline: none;
    }

    strong {
      display: block;
      font-size: 20px;
      line-height: 1.4;
      font-weight: 700;
    }

    span {
      color: var(--blue);
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>公視新聞 404 提案</h1>
    <p>四個方向放在同一個資料夾，方便提案與上 GitHub Pages 比較。</p>
    <div class="grid">
      <a href="01-dot-hole.html">
        <strong>避開洞洞 / 掉進洞口</strong>
        <span>Open →</span>
      </a>
      <a href="02-eyes-follow.html">
        <strong>眼睛跟隨</strong>
        <span>Open →</span>
      </a>
      <a href="03-road-interaction.html">
        <strong>長出路</strong>
        <span>Open →</span>
      </a>
      <a href="04-keyword-404.html">
        <strong>標籤排成 404</strong>
        <span>Open →</span>
      </a>
    </div>
  </main>
</body>
</html>
