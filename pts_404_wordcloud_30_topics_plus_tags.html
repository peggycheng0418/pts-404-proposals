    seed = (seed * 1664525 + 1013904223) >>> 0;

  }

  function overlaps(x, y, bw, bh) {
    for (const p of placed) {
      if (Math.abs(x - p.x) < (bw + p.w) / 2 + 2 && Math.abs(y - p.y) < (bh + p.h) / 2 + 1) return true;
    }
    return false;
  }

  function tryPlace(text, fs, weightCss, color, url, tries) {
    meas.font = weightCss + ' ' + fs + 'px sans-serif';
    const bw = meas.measureText(text).width + 2;
    const bh = fs * 1.15;

      const y = bh/2 + rand() * (H - bh);
